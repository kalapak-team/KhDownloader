services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mediadownloader
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/cookies:/app/cookies:ro
    env_file:
      - ./backend/.env

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app.celery worker --loglevel=info --concurrency=4
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/cookies:/app/cookies:ro
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
